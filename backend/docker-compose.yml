services:
  neits-backend:
    build:
      context: .
      dockerfile: Dockerfile

    image: neits-backend:latest
    container_name: neits-backend

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3000:3000"

    networks:
      - n8n_default

networks:
  n8n_default:
    external: true